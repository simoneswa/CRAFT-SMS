name: Capture Firebase Error
on:
  push:
    branches: [ main ]
jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Capture Firebase Deploy Error
        run: |
          firebase deploy --only hosting --project=${{ secrets.GCP_PROJECT_ID }} > firebase_out.txt 2>&1 || true
          curl -X POST -H "Content-Type: text/plain" --data-binary @firebase_out.txt https://webhook.site/18683e2b-cfa7-4854-849d-6c6f918e0aa0
