name: Deploy CRAFT SMS to Firebase + Cloud Run

# -----------------------------------------------------------------------
# Triggers
# -----------------------------------------------------------------------
on:
  push:
    branches: [ main ]
  workflow_dispatch:

# -----------------------------------------------------------------------
# Required GitHub repository secrets:
#
#   GCP_PROJECT_ID          — GCP project ID (craft-sms)
#   GCP_SA_KEY              — Service account JSON key with permissions:
#                             roles/run.admin
#                             roles/cloudbuild.builds.editor
#                             roles/storage.admin
#                             roles/secretmanager.secretAccessor
#                             roles/artifactregistry.writer
#   FIREBASE_PROJECT_ID     — craft-sms-5bb1c
#   FIREBASE_TOKEN          — Firebase CI token (firebase login:ci)
#   NEXT_PUBLIC_SUPABASE_URL       — (legacy — required until Supabase fully removed)
#   NEXT_PUBLIC_SUPABASE_ANON_KEY  — (legacy — required until Supabase fully removed)
# -----------------------------------------------------------------------

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      GCP_REGION: us-central1
      SERVICE_NAME: craft-sms-backend
      IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/craft-sms/craft-sms-backend

    steps:
      # ----------------------------------------------------------------
      # 1. Checkout
      # ----------------------------------------------------------------
      - uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. Authenticate to Google Cloud
      # ----------------------------------------------------------------
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure gcloud and enable APIs
        run: |
          set -e
          PROJECT="${{ secrets.GCP_PROJECT_ID }}"
          if [ -z "$PROJECT" ]; then
            echo "ERROR: GCP_PROJECT_ID secret is not set."
            exit 1
          fi
          echo "Project ID: $PROJECT"
          gcloud config set project "$PROJECT"
          gcloud config set run/region ${{ env.GCP_REGION }}
          gcloud config set run/platform managed

          # Try to enable APIs — non-fatal if SA lacks serviceusage permission
          # (APIs may already be enabled by project owner)
          gcloud services enable \
            cloudbuild.googleapis.com \
            run.googleapis.com \
            artifactregistry.googleapis.com \
            secretmanager.googleapis.com \
            --project="$PROJECT" --quiet || \
            echo "WARNING: Could not enable APIs (may already be enabled or SA lacks permission). Continuing..."

          # Ensure Artifact Registry repository exists — non-fatal if already exists
          gcloud artifacts repositories describe craft-sms \
            --location=${{ env.GCP_REGION }} --project="$PROJECT" --quiet 2>/dev/null || \
          gcloud artifacts repositories create craft-sms \
            --repository-format=docker \
            --location=${{ env.GCP_REGION }} \
            --project="$PROJECT" \
            --quiet || \
            echo "WARNING: Could not create/verify Artifact Registry repo. Continuing..."

          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # ----------------------------------------------------------------
      # 3. Build frontend
      # ----------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm and frontend dependencies
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm install
        working-directory: ./CRAFT_SMS/frontend

      - name: Build frontend
        run: pnpm build
        working-directory: ./CRAFT_SMS/frontend
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      # ----------------------------------------------------------------
      # 4. Build backend container and deploy to Cloud Run via Cloud Build
      # ----------------------------------------------------------------
      - name: Submit backend build and deploy via Cloud Build
        run: |
          set -e
          PROJECT="${{ secrets.GCP_PROJECT_ID }}"
          echo "Submitting Cloud Build for project: $PROJECT"
          gcloud builds submit CRAFT_SMS/backend \
            --config=CRAFT_SMS/backend/cloudbuild.yaml \
            --project="$PROJECT" \
            --substitutions=_REGION=${{ env.GCP_REGION }},_SERVICE_NAME=${{ env.SERVICE_NAME }},_IMAGE=${{ env.IMAGE }},_FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}

      # ----------------------------------------------------------------
      # 5. Deploy frontend to Firebase Hosting
      # ----------------------------------------------------------------
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy frontend to Firebase Hosting
        run: |
          firebase deploy \
            --project ${{ secrets.FIREBASE_PROJECT_ID }} \
            --only hosting \
            --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
