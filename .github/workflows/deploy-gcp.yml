name: Deploy CRAFT SMS to Firebase + Cloud Run

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm and frontend dependencies
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm install
        working-directory: ./CRAFT_SMS/frontend

      - name: Build frontend
        run: pnpm build
        working-directory: ./CRAFT_SMS/frontend

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Google Cloud SDK and authenticate
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          export_default_credentials: true

      - name: Configure gcloud project
        run: |
          gcloud config set project ${{ secrets.GCP_PROJECT_ID }}
          gcloud config set run/platform managed
          gcloud config set run/region us-central1

      - name: Build and push backend container
        run: |
          gcloud builds submit CRAFT_SMS/backend --config=CRAFT_SMS/backend/cloudbuild.yaml

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy craft-sms-backend \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/craft-sms-backend \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars CLOUD_SQL_CONNECTION_NAME=${{ secrets.CLOUD_SQL_CONNECTION_NAME }},DATABASE_URL=${{ secrets.DATABASE_URL }},FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }},FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }},FIREBASE_AUTH_JWT_AUD=${{ secrets.FIREBASE_AUTH_JWT_AUD }},FIREBASE_AUTH_JWT_ISS=${{ secrets.FIREBASE_AUTH_JWT_ISS }},ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy frontend to Firebase Hosting
        run: firebase deploy --project ${{ secrets.FIREBASE_PROJECT_ID }} --only hosting
        working-directory: ./CRAFT_SMS/frontend
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
